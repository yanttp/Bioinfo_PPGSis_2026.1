name: bioinfo
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ── Python base ──────────────────────────────────────────────
  - python=3.11

  # ── Utilitários gerais ───────────────────────────────────────
  - git
  - wget
  - curl
  - tree
  - htop
  - zip
  - unzip
  - pigz                  # gzip paralelo

  # ── Manipulação de sequências ────────────────────────────────
  - seqkit                # navegar/filtrar FASTA/FASTQ
  - entrez-direct         # acesso ao NCBI (efetch, esearch)
  - sra-tools             # fasterq-dump, prefetch

  # ── Módulo 2: QC e pré-processamento ────────────────────────
  - fastqc=0.12.1
  - multiqc=1.22
  - fastp=0.23.4
  - trimmomatic=0.39

  # ── Simulação de reads (datasets sintéticos) ─────────────────
  - art=2016.06.05        # ART: simula reads Illumina

  # ── Módulo 3: Montagem de genomas ───────────────────────────
  - spades=4.0.0
  - quast=5.2.0
  - busco=5.7.1
  - prokka=1.14.6         # anotação bacteriana

  # ── Módulo 3/5: Alinhamento ──────────────────────────────────
  - bwa-mem2=2.2.1
  - bowtie2=2.5.3
  - samtools=1.20
  - picard=3.1.1

  # ── Módulo 5: SNP Calling ────────────────────────────────────
  - stacks=2.65
  - vcftools=0.1.16
  - bcftools=1.20

  # ── R e pacotes ──────────────────────────────────────────────
  - r-base=4.4.1
  - r-essentials=4.4           # inclui tidyverse, ggplot2, etc.
  - bioconductor-phyloseq=1.48.0
  - bioconductor-dada2=1.32.0
  - r-vegan=2.6_6.1
  - r-adegenet=2.1.10
  - r-poppr=2.9.6
  - r-ape=5.8
  - r-reshape2
  - r-pheatmap
  - r-rcolorbrewer
  - r-plotly
  - r-httpgd               # gráficos interativos no VSCode
  - r-languageserver       # R LSP para VSCode
  - quarto                 # notebooks reprodutíveis

  # ── Jupyter (opcional, para notebooks Python) ────────────────
  - jupyterlab
  - ipykernel
